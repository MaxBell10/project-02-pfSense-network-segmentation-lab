<polygon points="130,72 178,93 178,150 130,176 82,150 82,93" style="fill:rgb(13, 17, 23);stroke:none;"/>

<!-- Firewall: 3 horizontal rule lines -->
<rect x="95" y="100" width="70" height="6" rx="1" fill="rgb(29, 158, 117)" opacity="0.8"/>
<rect x="95" y="114" width="50" height="6" rx="1" fill="rgb(55, 138, 221)" opacity="0.7"/>
<rect x="95" y="128" width="60" height="6" rx="1" fill="rgb(239, 159, 39)" opacity="0.6"/>

<!-- Firewall: vertical divider -->
<line x1="130" y1="96" x2="130" y2="148" stroke="rgb(29, 158, 117)" stroke-width="1" opacity="0.4"/>

<!-- Firewall: pass / block dots -->
<circle cx="154" cy="103" r="3" fill="rgb(29, 158, 117)" opacity="0.9"/>
<circle cx="154" cy="117" r="3" fill="rgb(224, 82, 82)" opacity="0.9"/>
<circle cx="154" cy="131" r="3" fill="rgb(239, 159, 39)" opacity="0.9"/>

<!-- WAN arrow in -->
