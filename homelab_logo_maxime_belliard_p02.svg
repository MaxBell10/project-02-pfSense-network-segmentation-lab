<line x1="120" y1="0" x2="120" y2="340" style="fill:none;stroke:rgb(29, 158, 117);stroke-width:0.4px;opacity:0.25;"/>
<line x1="200" y1="0" x2="200" y2="340" style="fill:none;stroke:rgb(29, 158, 117);stroke-width:0.4px;opacity:0.25;"/>
<line x1="560" y1="0" x2="560" y2="340" style="fill:none;stroke:rgb(29, 158, 117);stroke-width:0.4px;opacity:0.25;"/>
<line x1="640" y1="0" x2="640" y2="340" style="fill:none;stroke:rgb(29, 158, 117);stroke-width:0.4px;opacity:0.25;"/>
