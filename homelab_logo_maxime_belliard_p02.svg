<polygon points="90,119 98,123 90,127" fill="rgb(55, 138, 221)" opacity="0.7"/>

<!-- LAN arrow out -->
<line x1="162" y1="123" x2="180" y2="123" stroke="rgb(29, 158, 117)" stroke-width="1.5" opacity="0.7"/>
<polygon points="180,119 188,123 180,127" fill="rgb(29, 158, 117)" opacity="0.7"/>

<!-- Text: title -->
<text x="220" y="135" style="fill:rgb(255, 255, 255);font-family:monospace;font-size:28px;font-weight:700;text-anchor:start;">HOMELAB</text>
<text x="220" y="168" style="fill:rgb(29, 158, 117);font-family:monospace;font-size:28px;font-weight:700;text-anchor:start;">SECURITY</text>

<!-- Subtitle -->
<text x="222" y="195" style="fill:rgb(29, 158, 117);font-family:monospace;font-size:12px;font-weight:400;text-anchor:start;">pfSense · FIREWALL · SEGMENTATION</text>

