<text x="224" y="221" style="fill:rgb(29, 158, 117);font-family:monospace;font-size:10px;text-anchor:start;">WAN/LAN/DMZ</text>
<text x="296" y="221" style="fill:rgb(55, 138, 221);font-family:monospace;font-size:10px;text-anchor:start;">ISO 27001</text>
