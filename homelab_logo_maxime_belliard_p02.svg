<svg width="100%" viewBox="0 0 680 350" xmlns="http://www.w3.org/2000/svg">

<!-- Background -->
<rect x="0" y="0" width="680" height="340" rx="12" style="fill:rgb(13, 17, 23);stroke:none;"/>

